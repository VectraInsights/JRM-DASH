name: Keep Render Alive

on:
  schedule:
    - cron: '0 */3 * * *' # Roda a cada 3 horas
  workflow_dispatch:      # Permite rodar manualmente

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        env:
          APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Erro: A variável RENDER_APP_URL não está configurada nos Secrets."
            exit 1
          fi
          curl -I "$APP_URL"
