name: Keep Render Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:      # Permite rodar manualmente para testar

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render App
        env:
          APP_URL: ${{ secrets.RENDER_APP_URL }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "Erro: A variável RENDER_APP_URL não está configurada nos Secrets."
            exit 1
          fi
          # O parâmetro -s (silent) e -L (segue redirects) ajuda na performance do log
          curl -sL -I "$APP_URL" | grep "HTTP/"
