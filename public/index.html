<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa - JRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0e1117;
            --sidebar-bg: #262730;
            --text-main: #ffffff;
            --text-sub: #a3aed0;
            --accent-red: #ff4b4b;
            --accent-green: #00c092;
            --accent-blue: #3b82f6;
        }

        body {
            font-family: "Source Sans Pro", sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* BARRA LATERAL */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar h1 {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--accent-red);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--text-sub);
        }

        select, input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.2);
            background-color: var(--bg-dark);
            color: white;
            font-size: 1rem;
        }

        .btn-sync {
            background-color: var(--accent-red);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-sync:hover {
            opacity: 0.8;
            transform: translateY(-2px);
        }

        /* ÁREA PRINCIPAL */
        .content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h2 {
            font-size: 2rem;
            margin: 0;
            border-bottom: 2px solid var(--accent-red);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* CARDS */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--sidebar-bg);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #464855;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card.banco { border-left-color: #8b5cf6; }
        .card.receita { border-left-color: var(--accent-green); }
        .card.despesa { border-left-color: var(--accent-red); }
        .card.resultado { border-left-color: var(--accent-blue); }

        .card-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            font-weight: bold;
            color: var(--text-sub);
        }

        .card-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* GRÁFICO */
        .chart-box {
            background-color: var(--sidebar-bg);
            padding: 30px;
            border-radius: 15px;
            height: 500px;
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h1>Fluxo de Caixa JRM</h1>
    
    <div class="form-group">
        <label>Selecione a Empresa</label>
        <select id="empresa">
            <option value="Juvenal Transportes">Juvenal Transportes</option>
            <option value="JRM Transportes">JRM Transportes</option>
            <option value="LGP">LGP</option>
            <option value="ROSE">Rosângela Transportes</option>
        </select>
    </div>

    <div class="form-group">
        <label>Escolha o intervalo</label>
        <select id="intervalo" onchange="checkCustom()">
            <option value="7">Próximos 7 dias</option>
            <option value="15">Próximos 15 dias</option>
            <option value="30">Próximos 30 dias</option>
            <option value="custom">Personalizado</option>
        </select>
    </div>

    <div id="custom-range" style="display: none;">
        <div class="form-group">
            <label>Data Inicial</label>
            <input type="date" id="data_ini">
        </div>
        <div class="form-group">
            <label>Data Final</label>
            <input type="date" id="data_fim">
        </div>
    </div>

    <button class="btn-sync" onclick="fetchData()">Sincronizar Dados</button>
</aside>

<main class="content">
    <div class="header">
        <h2>Fluxo de Caixa</h2>
    </div>

    <div class="dashboard-grid">
        <div class="card banco">
            <div class="card-title">Saldo em Banco</div>
            <div id="card-saldo-banco" class="card-value">R$ 0,00</div>
        </div>
        <div class="card receita">
            <div class="card-title">Receitas</div>
            <div id="card-receitas" class="card-value" style="color: var(--accent-green);">R$ 0,00</div>
        </div>
        <div class="card despesa">
            <div class="card-title">Despesas</div>
            <div id="card-despesas" class="card-value" style="color: var(--accent-red);">R$ 0,00</div>
        </div>
        <div class="card resultado">
            <div class="card-title">Resultado Período</div>
            <div id="card-resultado" class="card-value">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-box">
        <canvas id="fluxoChart"></canvas>
    </div>
</main>

<script>
    let myChart = null;

    function checkCustom() {
        const isCustom = document.getElementById('intervalo').value === 'custom';
        document.getElementById('custom-range').style.display = isCustom ? 'block' : 'none';
    }

    async function fetchData() {
        const empresa = document.getElementById('empresa').value;
        const intervalo = document.getElementById('intervalo').value;
        let d_ini, d_fim;

        if (intervalo === 'custom') {
            d_ini = document.getElementById('data_ini').value;
            d_fim = document.getElementById('data_fim').value;
        } else {
            const hoje = new Date();
            const fim = new Date();
            fim.setDate(hoje.getDate() + parseInt(intervalo));
            d_ini = hoje.toISOString().split('T')[0];
            d_fim = fim.toISOString().split('T')[0];
        }

        if (!d_ini || !d_fim) return alert("Selecione as datas corretamente.");

        const response = await fetch(`/api/dados?empresa=${encodeURIComponent(empresa)}&data_inicio=${d_ini}&data_fim=${d_fim}`);
        const data = await response.json();

        // Atualizar Cards
        const fmt = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        document.getElementById('card-saldo-banco').innerText = fmt(data.cards.saldo_banco);
        document.getElementById('card-receitas').innerText = fmt(data.cards.total_receitas);
        document.getElementById('card-despesas').innerText = fmt(data.cards.total_despesas);
        document.getElementById('card-resultado').innerText = fmt(data.cards.resultado_periodo);

        // Atualizar Gráfico
        const ctx = document.getElementById('fluxoChart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            data: {
                labels: data.labels,
                datasets: [
                    {
                        type: 'bar',
                        label: 'Receitas',
                        data: data.receitas,
                        backgroundColor: '#00c092',
                        borderRadius: 5
                    },
                    {
                        type: 'bar',
                        label: 'Despesas',
                        data: data.despesas,
                        backgroundColor: '#ff4b4b',
                        borderRadius: 5
                    },
                    {
                        type: 'line',
                        label: 'Saldo Projetado',
                        data: data.saldo_projetado,
                        borderColor: '#3b82f6',
                        borderWidth: 3,
                        pointRadius: 4,
                        tension: 0.3,
                        fill: false
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#a3aed0' } },
                    x: { grid: { display: false }, ticks: { color: '#a3aed0' } }
                },
                plugins: {
                    legend: { position: 'top', labels: { color: 'white', font: { weight: 'bold' } } }
                }
            }
        });
    }

    // Carregamento inicial
    window.onload = fetchData;
</script>
</body>
</html>
