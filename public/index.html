<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa Consolidado - JRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg: #0e1117; 
            --sidebar: #262730; 
            --text: #ffffff; 
            --accent: #ff4b4b; 
            --green: #2ecc71;
            --blue: #3498db;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
        }
        
        /* Sidebar Retrátil */
        .sidebar { 
            width: 300px; 
            background: var(--sidebar); 
            height: 100vh; 
            padding: 20px; 
            box-sizing: border-box; 
            position: fixed; 
            left: 0; 
            transition: transform 0.3s ease; 
            z-index: 10;
            border-right: 1px solid var(--border);
        }

        .main-content { 
            flex: 1; 
            margin-left: 300px; 
            padding: 40px; 
            transition: margin-left 0.3s ease; 
            overflow-y: auto;
        }
        
        /* Classe de controle do Menu */
        body.sidebar-closed .sidebar { transform: translateX(-300px); }
        body.sidebar-closed .main-content { margin-left: 0; }

        .toggle-btn {
            position: fixed; 
            left: 10px; 
            bottom: 10px; 
            z-index: 20; 
            background: var(--sidebar);
            color: white; 
            border: 1px solid var(--border); 
            padding: 8px 12px; 
            cursor: pointer; 
            border-radius: 4px;
            font-size: 12px;
        }

        h1 { border-bottom: 2px solid var(--accent); display: inline-block; padding-bottom: 5px; margin-bottom: 30px; }
        label { display: block; margin-top: 15px; font-size: 0.85rem; opacity: 0.8; }
        
        input, select, button.sync { 
            width: 100%; 
            padding: 12px; 
            margin-top: 8px; 
            border-radius: 4px; 
            border: 1px solid var(--border); 
            background: var(--bg);
            color: white;
            box-sizing: border-box;
        }

        button.sync { 
            background: transparent; 
            color: var(--accent); 
            border: 1px solid var(--accent);
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 30px; 
            transition: 0.2s;
        }
        button.sync:hover { background: var(--accent); color: white; }
        
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--sidebar); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
        .card-label { font-size: 0.7rem; font-weight: bold; opacity: 0.6; margin-bottom: 10px; text-transform: uppercase; }
        .card-val { font-size: 1.4rem; font-weight: 600; }

        .chart-container { 
            background: var(--sidebar); 
            padding: 25px; 
            border-radius: 12px; 
            height: 450px; 
            border: 1px solid var(--border); 
        }
    </style>
</head>
<body>

<button class="toggle-btn" onclick="toggleSidebar()">☰ Menu</button>

<div class="sidebar">
    <h2 style="margin-top: 40px;">Filtros</h2>
    
    <label>Empresa</label>
    <select id="select-empresa"></select>
    
    <label>Data Início</label>
    <input type="date" id="data-inicio">
    
    <label>Data Fim</label>
    <input type="date" id="data-fim">
    
    <button class="sync" onclick="carregarDados()">ATUALIZAR DASHBOARD</button>
</div>

<div class="main-content">
    <h1>Dashboard JRM</h1>
    
    <div class="cards">
        <div class="card">
            <div class="card-label">Saldo em Banco</div>
            <div id="res-banco" class="card-val" style="color: var(--blue)">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-label">Total a Receber</div>
            <div id="res-rec" class="card-val" style="color: var(--green)">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-label">Total a Pagar</div>
            <div id="res-desp" class="card-val" style="color: var(--accent)">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-label">Saldo Projetado</div>
            <div id="res-saldo-final" class="card-val">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="fluxoChart"></canvas>
    </div>
</div>

<script>
    let meuGrafico;

    function toggleSidebar() {
        document.body.classList.toggle('sidebar-closed');
    }

    // Busca empresas e define datas ao carregar
    async function init() {
        try {
            const resp = await fetch('/api/empresas');
            const empresas = await resp.json();
            const select = document.getElementById('select-empresa');
            
            select.innerHTML = '<option value="todas">Todas as Empresas</option>';
            empresas.forEach(e => {
                select.innerHTML += `<option value="${e.nome}">${e.nome}</option>`;
            });
            
            const hoje = new Date();
            const futuro = new Date();
            futuro.setDate(hoje.getDate() + 15);
            
            document.getElementById('data-inicio').value = hoje.toISOString().split('T')[0];
            document.getElementById('data-fim').value = futuro.toISOString().split('T')[0];
            
            carregarDados();
        } catch (err) {
            console.error("Erro ao iniciar:", err);
        }
    }

    async function carregarDados() {
        const emp = document.getElementById('select-empresa').value;
        const ini = document.getElementById('data-inicio').value;
        const fim = document.getElementById('data-fim').value;
        
        try {
            const resp = await fetch(`/api/dados?empresa=${emp}&data_inicio=${ini}&data_fim=${fim}`);
            const d = await resp.json();
            
            const fmt = v => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            
            document.getElementById('res-banco').innerText = fmt(d.resumo.banco);
            document.getElementById('res-rec').innerText = fmt(d.resumo.total_rec);
            document.getElementById('res-desp').innerText = fmt(d.resumo.total_desp);
            
            const saldoFinal = d.saldo[d.saldo.length - 1] || 0;
            const elSaldo = document.getElementById('res-saldo-final');
            elSaldo.innerText = fmt(saldoFinal);
            elSaldo.style.color = saldoFinal >= 0 ? 'var(--green)' : 'var(--accent)';

            if(meuGrafico) meuGrafico.destroy();
            const ctx = document.getElementById('fluxoChart').getContext('2d');
            
            meuGrafico = new Chart(ctx, {
                data: {
                    labels: d.labels,
                    datasets: [
                        {
                            type: 'line',
                            label: 'Saldo Projetado',
                            data: d.saldo,
                            borderColor: '#3498db',
                            borderWidth: 3,
                            tension: 0.2,
                            fill: false,
                            yAxisID: 'y'
                        },
                        {
                            type: 'bar',
                            label: 'Receitas',
                            data: d.receitas,
                            backgroundColor: 'rgba(46, 204, 113, 0.7)',
                            yAxisID: 'y1'
                        },
                        {
                            type: 'bar',
                            label: 'Despesas',
                            data: d.despesas.map(x => -x),
                            backgroundColor: 'rgba(255, 75, 75, 0.7)',
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#fff' } } },
                    scales: {
                        y: { position: 'left', ticks: { color: '#3498db' } },
                        y1: { position: 'right', grid: { drawOnChartArea: false }, ticks: { color: '#ccc' } },
                        x: { ticks: { color: '#fff' } }
                    }
                }
            });
        } catch (err) {
            console.error(err);
        }
    }

    window.onload = init;
</script>
</body>
</html>
