<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro JRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0e1117;
            --sidebar: #262730;
            --text: #ffffff;
            --subtext: #a3aed0;
            --red: #ff4b4b;
            --green: #00c092;
            --blue: #3b82f6;
            --purple: #8b5cf6;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background-color: var(--sidebar);
            padding: 30px 20px;
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.85rem;
            color: var(--subtext);
            margin-bottom: 8px;
            display: block;
        }

        select, input {
            width: 100%;
            background: var(--bg);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .btn-sync {
            background-color: var(--red);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-sync:hover { opacity: 0.8; }

        /* Main Content */
        .main {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        h2 {
            font-size: 2rem;
            margin: 0 0 30px 0;
            border-bottom: 2px solid var(--red);
            display: inline-block;
            padding-bottom: 5px;
        }

        /* Dashboard Cards */
        .cards-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .card {
            background-color: var(--sidebar);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #464855;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .card.banco { border-left-color: var(--purple); }
        .card.receita { border-left-color: var(--green); }
        .card.despesa { border-left-color: var(--red); }
        .card.resultado { border-left-color: var(--blue); }

        .card-label {
            font-size: 0.75rem;
            font-weight: bold;
            color: var(--subtext);
            text-transform: uppercase;
        }

        .card-value {
            font-size: 1.4rem;
            font-weight: bold;
            margin-top: 10px;
        }

        /* Chart Area */
        .chart-wrapper {
            background-color: var(--sidebar);
            padding: 30px;
            border-radius: 15px;
            height: 500px;
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <label>Selecione a Empresa</label>
    <select id="empresa">
        <option value="Juvenal Transportes">Juvenal Transportes</option>
        <option value="JRM Transportes">JRM Transportes</option>
        <option value="LGP">LGP</option>
        <option value="ROSE">Rosângela Transportes</option>
    </select>

    <label>Escolha o intervalo</label>
    <select id="intervalo" onchange="toggleCustom()">
        <option value="7">Próximos 7 dias</option>
        <option value="15">Próximos 15 dias</option>
        <option value="30">Próximos 30 dias</option>
        <option value="custom">Personalizado</option>
    </select>

    <div id="custom-dates" style="display: none;">
        <label>Início</label>
        <input type="date" id="d_inicio">
        <label>Fim</label>
        <input type="date" id="d_fim">
    </div>

    <button class="btn-sync" onclick="carregarDados()">Sincronizar Dados</button>
</aside>

<main class="main">
    <h2>Fluxo de Caixa</h2>
    
    <div class="cards-container">
        <div class="card banco">
            <div class="card-label">Saldo em Banco</div>
            <div id="v-banco" class="card-value">R$ 0,00</div>
        </div>
        <div class="card receita">
            <div class="card-label">Receitas</div>
            <div id="v-receitas" class="card-value" style="color: var(--green);">R$ 0,00</div>
        </div>
        <div class="card despesa">
            <div class="card-label">Despesas</div>
            <div id="v-despesas" class="card-value" style="color: var(--red);">R$ 0,00</div>
        </div>
        <div class="card resultado">
            <div class="card-label">Resultado Período</div>
            <div id="v-resultado" class="card-value">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-wrapper">
        <canvas id="mainChart"></canvas>
    </div>
</main>

<script>
    let meuGrafico = null;

    function toggleCustom() {
        const display = document.getElementById('intervalo').value === 'custom' ? 'block' : 'none';
        document.getElementById('custom-dates').style.display = display;
    }

    async function carregarDados() {
        const empresa = document.getElementById('empresa').value;
        const inter = document.getElementById('intervalo').value;
        let d1, d2;

        if (inter === 'custom') {
            d1 = document.getElementById('d_inicio').value;
            d2 = document.getElementById('d_fim').value;
        } else {
            const hoje = new Date();
            const fim = new Date();
            fim.setDate(hoje.getDate() + parseInt(inter));
            d1 = hoje.toISOString().split('T')[0];
            d2 = fim.toISOString().split('T')[0];
        }

        if (!d1 || !d2) return alert("Selecione as datas corretamente.");

        try {
            const res = await fetch(`/api/dados?empresa=${encodeURIComponent(empresa)}&data_inicio=${d1}&data_fim=${d2}`);
            const data = await res.json();

            // Atualiza os valores nos Cards
            const formatar = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('v-banco').innerText = formatar(data.resumo.banco);
            document.getElementById('v-receitas').innerText = formatar(data.resumo.total_rec);
            document.getElementById('v-despesas').innerText = formatar(data.resumo.total_desp);
            document.getElementById('v-resultado').innerText = formatar(data.resumo.total_rec - data.resumo.total_desp);

            // Renderiza o Gráfico
            const ctx = document.getElementById('mainChart').getContext('2d');
            if (meuGrafico) meuGrafico.destroy();

            meuGrafico = new Chart(ctx, {
                data: {
                    labels: data.labels,
                    datasets: [
                        { type: 'bar', label: 'Receitas', data: data.receitas, backgroundColor: '#00c092' },
                        { type: 'bar', label: 'Despesas', data: data.despesas, backgroundColor: '#ff4b4b' },
                        { type: 'line', label: 'Saldo Projetado', data: data.saldo, borderColor: '#3b82f6', tension: 0.3, fill: false, borderWidth: 3 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: 'white', font: { size: 12 } } }
                    },
                    scales: {
                        y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#a3aed0' } },
                        x: { grid: { display: false }, ticks: { color: '#a3aed0' } }
                    }
                }
            });
        } catch (e) {
            console.error("Erro ao carregar dados:", e);
        }
    }

    // Inicializa ao carregar a página
    window.onload = carregarDados;
</script>
</body>
</html>
