<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa - JRM Gestão</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0e1117; 
            --sidebar: #262730; 
            --text: #ffffff;
            --green: #2ecc71; 
            --red: #ff4b4b; 
            --blue: #3498db;
            --border: rgba(255, 255, 255, 0.1);
            --card-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        body.light-mode {
            --bg: #f8f9fa;
            --sidebar: #ffffff;
            --text: #31333f;
            --border: rgba(0, 0, 0, 0.08);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
        body.light-mode ::-webkit-scrollbar-thumb { background: #ccc; }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: "Source Sans Pro", sans-serif; 
            margin: 0; 
            display: flex; 
            height: 100vh;
            overflow: hidden;
            transition: background-color 0.3s ease;
        }

        #loading-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            backdrop-filter: blur(3px);
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--red);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 25px;
            background: transparent;
            border: none;
            color: var(--text);
            cursor: pointer;
            z-index: 1001;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: none;
            font-size: 1.0rem;
            transition: opacity 0.2s;
        }

        .theme-toggle:hover { opacity: 0.7; }
        
        .sidebar { 
            width: 300px; padding: 30px 20px; 
            background: var(--sidebar); 
            height: 100vh; position: fixed; left: 0; top: 0;
            box-sizing: border-box;
            border-right: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .main { 
            flex: 1; margin-left: 300px; padding: 40px; 
            overflow-y: auto;
            transition: margin-left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .toggle-btn {
            position: fixed; 
            top: 32px; 
            left: 270px; 
            background: transparent;
            border: none;
            color: var(--text); 
            cursor: pointer; 
            z-index: 1002; 
            transition: all 0.2s ease;
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-size: 22px; 
            font-weight: bold;
            opacity: 0.5;
            padding: 5px;
        }

        .toggle-btn:hover {
            opacity: 1;
            color: var(--blue);
        }

        body.sidebar-closed .sidebar { transform: translateX(-100%); }
        body.sidebar-closed .main { margin-left: 0; }
        body.sidebar-closed .toggle-btn { left: 15px; }

        h1 { 
            margin-top: 0; 
            font-size: 1.8rem; 
            margin-bottom: 25px; 
            display: inline-block; 
            padding-bottom: 5px;
            transition: padding-left 0.3s ease;
        }

        body.sidebar-closed h1 { padding-left: 45px; }

        .sidebar h3 { font-size: 1rem; margin: 25px 0 15px 0; border-bottom: 1px solid var(--border); padding-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; opacity: 0.8; }
        .sidebar label { font-size: 0.8rem; opacity: 0.8; display: block; margin-bottom: 5px; }

        .sidebar select, .sidebar input[type="date"] {
            width: 100%; background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text); padding: 10px;
            border-radius: 6px; margin-bottom: 15px;
            box-sizing: border-box; font-size: 0.9rem;
            color-scheme: dark;
        }
        body.light-mode .sidebar select, body.light-mode .sidebar input[type="date"] {
            color-scheme: light;
        }

        .bank-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 10px 0; border-bottom: 1px solid var(--border);
        }
        .bank-info { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .bank-logo {
            width: 28px; height: 28px; border-radius: 4px; background: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold; color: #000; overflow: hidden; flex-shrink: 0;
        }
        .bank-logo img { width: 100%; height: 100%; object-fit: contain; }
        .bank-name-text { font-size: 0.85rem; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bank-val-text { font-size: 0.9rem; font-weight: 600; text-align: right; flex-shrink: 0; }

        .section-label { display: block; font-size: 0.75rem; font-weight: bold; opacity: 0.6; margin-bottom: 15px; letter-spacing: 1px; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--sidebar); padding: 20px; border-radius: 8px; border-left: 5px solid transparent; box-shadow: var(--card-shadow); }
        .card-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 8px; font-weight: bold;}
        .card-val { font-size: 1.4rem; font-weight: 600; }

        .btn-sync { 
            width: 100%; padding: 12px; background: var(--red); 
            color: white; border: none; border-radius: 4px; font-weight: bold; 
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-sync:hover { filter: brightness(1.2); }

        .chart-container { 
            background: var(--sidebar); padding: 25px; border-radius: 12px; height: 480px; 
            border: 1px solid var(--border); box-shadow: var(--card-shadow); position: relative;
        }
    </style>
</head>
<body>

<div id="loading-overlay"><div class="spinner"></div></div>

<button class="theme-toggle" onclick="toggleTheme()" title="Alternar Tema">
    <span id="theme-icon">🌙</span>
</button>

<button class="toggle-btn" id="btnToggle" onclick="toggleSidebar()">«</button>

<aside class="sidebar">
    <div class="sidebar-content">
        <h3>Filtros</h3>
        <label>Empresa</label>
        <select id="empresa" onchange="sincronizar()">
            <option value="todas" selected>Todas as Empresas</option>
        </select>

        <label>Intervalo de Projeção</label>
        <select id="intervalo" onchange="ajustarDatas()">
            <option value="0">Hoje</option>
            <option value="7" selected>Próximos 7 dias</option>
            <option value="15">Próximos 15 dias</option>
            <option value="30">Próximos 30 dias</option>
            <option value="personalizado">Personalizado</option>
        </select>

        <div id="container-datas" style="display:none;">
            <label>Início</label>
            <input type="date" id="data_inicio">
            <label>Fim</label>
            <input type="date" id="data_fim">
        </div>

        <button class="btn-sync" onclick="sincronizar()">Sincronizar Dados</button>
        <button class="btn-sync" onclick="exportarPDF()" style="background: var(--blue); margin-top: 10px;">Exportar PDF</button>

        <h3>Bancos</h3>
        <div id="lista-bancos">
            <div style="font-size: 0.8rem; opacity: 0.5; text-align: center;">Aguardando sincronização...</div>
        </div>
    </div>
</aside>

<main class="main">
    <h1>Fluxo de Caixa</h1>

    <div class="section-label">RESUMO DA PROJEÇÃO</div>
    <div class="cards">
        <div class="card" style="border-left-color: #9b59b6;">
            <div class="card-label">SALDO ATUAL</div>
            <div id="v-banco" class="card-val" style="color: #9b59b6;">R$ 0,00</div>
        </div>
        <div class="card" style="border-left-color: var(--green);">
            <div class="card-label">ENTRADAS PREVISTAS</div>
            <div id="v-rec" class="card-val" style="color:var(--green)">R$ 0,00</div>
        </div>
        <div class="card" style="border-left-color: var(--red);">
            <div class="card-label">SAÍDAS PREVISTAS</div>
            <div id="v-desp" class="card-val" style="color:var(--red)">R$ 0,00</div>
        </div>
        <div class="card" id="card-resultado" style="border-left-color: var(--blue);">
            <div class="card-label">SALDO PREVISTO</div>
            <div id="v-res" class="card-val">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</main>

<script>
    let chart;

    function toggleSidebar() { 
        const body = document.body;
        const btn = document.getElementById('btnToggle');
        body.classList.toggle('sidebar-closed');
        btn.innerText = body.classList.contains('sidebar-closed') ? '»' : '«';

        if(chart) {
            setTimeout(() => { chart.resize(); }, 350);
        }
    }

    function toggleTheme() {
        const body = document.body;
        const icon = document.getElementById('theme-icon');
        body.classList.toggle('light-mode');
        const isLight = body.classList.contains('light-mode');
        icon.innerText = isLight ? "☀️" : "🌙";
        localStorage.setItem('theme', isLight ? 'light' : 'dark');
        
        if(chart) {
            const textColor = isLight ? '#31333f' : '#ffffff';
            const gridColor = isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)';
            chart.options.plugins.legend.labels.color = textColor;
            chart.options.scales.x.ticks.color = textColor;
            chart.options.scales.y.ticks.color = textColor;
            chart.options.scales.y.grid.color = gridColor;
            chart.update();
        }
    }

    async function carregarEmpresas() {
        try {
            const res = await fetch('/api/empresas');
            if (!res.ok) throw new Error();
            const empresas = await res.json();
            const select = document.getElementById('empresa');
            empresas.forEach(emp => {
                const opt = document.createElement('option');
                opt.value = emp.nome; opt.innerText = emp.nome;
                select.appendChild(opt);
            });
        } catch (err) { console.error("Erro ao carregar empresas."); }
    }

    function formatarDataISO(data) {
        const z = n => (n < 10 ? '0' : '') + n;
        return `${data.getFullYear()}-${z(data.getMonth() + 1)}-${z(data.getDate())}`;
    }

    function ajustarDatas() {
        const intervaloSelect = document.getElementById('intervalo');
        const containerDatas = document.getElementById('container-datas');
        const hoje = new Date();

        if (intervaloSelect.value === 'personalizado') {
            containerDatas.style.display = 'block';
        } else {
            containerDatas.style.display = 'none';
            const dias = parseInt(intervaloSelect.value);
            
            const dataInicio = new Date(hoje);
            const dataFim = new Date(hoje);
            dataFim.setDate(hoje.getDate() + dias);

            document.getElementById('data_inicio').value = formatarDataISO(dataInicio);
            document.getElementById('data_fim').value = formatarDataISO(dataFim);
            
            sincronizar();
        }
    }

    async function sincronizar() {
        const empresa = document.getElementById('empresa').value;
        const data_inicio = document.getElementById('data_inicio').value;
        const data_fim = document.getElementById('data_fim').value;

        if (!data_inicio || !data_fim) return;

        const loader = document.getElementById('loading-overlay');
        loader.style.display = 'flex';

        try {
            const query = new URLSearchParams({ empresa, data_inicio, data_fim });
            const res = await fetch(`/api/dados?${query.toString()}`);
            if (!res.ok) throw new Error("Erro na resposta da rede");
            const data = await res.json();
            renderizarDashboard(data);
        } catch (err) {
            console.error(err);
        } finally {
            setTimeout(() => { loader.style.display = 'none'; }, 500);
        }
    }

    async function exportarPDF() {
        const empresa = document.getElementById('empresa').value;
        const data_inicio = document.getElementById('data_inicio').value;
        const data_fim = document.getElementById('data_fim').value;

        if (!data_inicio || !data_fim) {
            alert("Por favor, sincronize ou selecione as datas antes de exportar.");
            return;
        }

        const loader = document.getElementById('loading-overlay');
        loader.style.display = 'flex';

        try {
            const query = new URLSearchParams({ empresa, data_inicio, data_fim });
            const response = await fetch(`/api/exportar-pdf?${query.toString()}`);
            
            if (!response.ok) throw new Error("Erro ao gerar PDF no servidor.");

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Fluxo_Caixa_${empresa}_${data_inicio}.pdf`;
            document.body.appendChild(a);
            a.click();
            window.URL.revokeObjectURL(url);
            a.remove();
        } catch (err) {
            console.error(err);
            alert("Erro ao exportar PDF. Verifique se o backend está ativo.");
        } finally {
            loader.style.display = 'none';
        }
    }

    function getLogoUrl(nome) {
        const n = (nome || '').toUpperCase();
        if (n.includes('ITAU')) return 'https://upload.wikimedia.org/wikipedia/commons/8/8a/Banco_Ita%C3%BA_logo.svg';
        if (n.includes('BRADESCO')) return 'https://banco.bradesco/assets/common/img/favicon.ico';
        if (n.includes('SICOOB')) return 'https://www.sicoob.com.br/favicon.ico';
        return ''; 
    }

    function renderizarDashboard(data) {
        if (!data) return;
        
        const fmt = v => (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        const isLight = document.body.classList.contains('light-mode');
        const textColor = isLight ? '#31333f' : '#ffffff';

        const bancosPermitidos = ["ITAU", "SICOOB", "BRADESCO"];
        const bancos = data.saldos_por_banco || [];
        const nomesVistos = new Set();
        
        const bancosFiltrados = bancos.filter(b => {
            const nomeUp = (b.nome || '').toUpperCase();
            const ePermitido = bancosPermitidos.some(p => nomeUp.includes(p));
            if (!ePermitido || nomesVistos.has(nomeUp) || Math.abs(b.saldo) < 0.01) return false;
            nomesVistos.add(nomeUp);
            return true;
        }).sort((a, b) => a.nome.localeCompare(b.nome));

        const containerBancos = document.getElementById('lista-bancos');
        containerBancos.innerHTML = '';
        bancosFiltrados.forEach(banco => {
            const logo = getLogoUrl(banco.nome);
            const item = document.createElement('div');
            item.className = 'bank-item';
            item.innerHTML = `
                <div class="bank-info">
                    <div class="bank-logo">
                        ${logo ? `<img src="${logo}" alt="logo">` : (banco.nome || '?').charAt(0)}
                    </div>
                    <div class="bank-name-text" title="${banco.nome}">${banco.nome}</div>
                </div>
                <div class="bank-val-text" style="color: ${banco.saldo < 0 ? 'var(--red)' : 'inherit'}">
                    ${fmt(banco.saldo)}
                </div>
            `;
            containerBancos.appendChild(item);
        });

        const resumo = data.resumo || { total_rec: 0, total_desp: 0 };
        const saldoAtualBancos = bancosFiltrados.reduce((acc, b) => acc + b.saldo, 0);
        
        document.getElementById('v-banco').innerText = fmt(saldoAtualBancos);
        document.getElementById('v-rec').innerText = fmt(resumo.total_rec);
        document.getElementById('v-desp').innerText = fmt(-Math.abs(resumo.total_desp || 0));
        
        const saldoPrevisto = saldoAtualBancos + (Number(resumo.total_rec) || 0) - Math.abs(Number(resumo.total_desp) || 0);
        const elRes = document.getElementById('v-res');
        const cardRes = document.getElementById('card-resultado');
        
        elRes.innerText = fmt(saldoPrevisto);
        const corFinal = saldoPrevisto >= 0 ? 'var(--green)' : 'var(--red)';
        elRes.style.color = corFinal;
        cardRes.style.borderLeftColor = corFinal;

        if(chart) chart.destroy();
        const ctx = document.getElementById('mainChart').getContext('2d');
        chart = new Chart(ctx, {
            data: {
                labels: data.labels || [],
                datasets: [
                    { 
                        type: 'line', 
                        label: 'Saldo Acumulado', 
                        data: data.saldo || [], 
                        borderColor: '#3498db', 
                        borderWidth: 3, 
                        pointRadius: 4, 
                        tension: 0.3, 
                        fill: false 
                    },
                    { 
                        type: 'bar', 
                        label: 'Receitas', 
                        data: data.receitas || [], 
                        backgroundColor: '#2ecc71', 
                        borderRadius: 4,
                        stack: 'combined'
                    },
                    { 
                        type: 'bar', 
                        label: 'Despesas', 
                        data: (data.despesas || []).map(d => -Math.abs(d)), 
                        backgroundColor: '#ff4b4b', 
                        borderRadius: 4,
                        stack: 'combined'
                    }
                ]
            },
            options: {
                responsive: true, 
                maintainAspectRatio: false,
                plugins: { 
                    legend: { labels: { color: textColor, font: { weight: 'bold' } }, position: 'bottom' },
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: { 
                        stacked: true, 
                        ticks: { color: textColor }, 
                        grid: { display: false } 
                    },
                    y: { 
                        stacked: true,
                        ticks: { 
                            color: textColor, 
                            callback: v => v.toLocaleString('pt-BR', { compactDisplay: 'short', notation: 'compact' }) 
                        }, 
                        grid: { color: isLight ? 'rgba(0,0,0,0.05)' : 'rgba(255,255,255,0.05)' } 
                    }
                }
            }
        });
    }

    document.addEventListener('DOMContentLoaded', async () => {
        if(localStorage.getItem('theme') === 'light') toggleTheme();
        await carregarEmpresas();
        ajustarDatas();
    });
</script>
</body>
</html>
