<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>JRM Financeiro - Estilo Streamlit</title>
    <style>
        :root { --st-bg: #ffffff; --st-sidebar: #f0f2f6; --st-primary: #ff4b4b; --st-text: #31333f; }
        body { font-family: "Source Sans Pro", sans-serif; background: var(--st-bg); color: var(--st-text); margin: 0; display: flex; }
        
        /* Sidebar lateral idêntica ao Streamlit */
        .sidebar { width: 300px; background: var(--st-sidebar); height: 100vh; padding: 40px 20px; position: fixed; border-right: 1px solid #ddd; }
        .main { margin-left: 340px; padding: 40px; width: 100%; max-width: 900px; }
        
        h1 { font-size: 2.5rem; margin-bottom: 30px; border-bottom: 2px solid var(--st-primary); padding-bottom: 10px; }
        .st-card { background: white; padding: 20px; border-radius: 10px; border: 1px solid #e6e9ef; margin-bottom: 20px; box-shadow: 2px 2px 5px rgba(0,0,0,0.02); }
        .st-metric-label { font-size: 0.9rem; color: #5f6368; text-transform: uppercase; }
        .st-metric-value { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }
        
        label { display: block; margin: 15px 0 5px; font-weight: bold; font-size: 0.9rem; }
        select, input { width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #ccc; margin-bottom: 10px; }
        button { width: 100%; background: var(--st-primary); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 15px; border-bottom: 2px solid #eee; background: #f9f9f9; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .pos { color: #27ae60; } .neg { color: #e74c3c; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>Configurações</h2>
    <label>Selecione a Empresa</label>
    <select id="empresa"><option>Carregando...</option></select>
    
    <label>Período (Dias)</label>
    <input type="number" id="dias" value="7">
    
    <button onclick="carregar()">Rodar Dashboard</button>
</div>

<div class="main">
    <h1>Fluxo de Caixa Operacional</h1>
    
    <div class="st-card">
        <div class="st-metric-label">Saldo Atual Consolidado</div>
        <div class="st-metric-value" id="saldo">R$ 0,00</div>
    </div>

    <div class="st-card">
        <h3>Detalhamento Diário</h3>
        <table id="tabela">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Receber</th>
                    <th>Pagar</th>
                    <th>Saldo Previsto</th>
                </tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>
</div>

<script>
    // Se o seu site é https://jrm-dashboard.vercel.app, a API está em /api
    const API_BASE = window.location.origin + "/api";

    async function init() {
        try {
            const res = await fetch(`${API_BASE}/clientes`);
            const empresas = await res.json();
            const select = document.getElementById("empresa");
            select.innerHTML = empresas.map(e => `<option value="${e}">${e}</option>`).join('');
            if(empresas.length > 0) carregar();
        } catch(e) { console.error("Erro ao carregar empresas", e); }
    }

    async function carregar() {
        const emp = document.getElementById("empresa").value;
        const dias = document.getElementById("dias").value;
        const res = await fetch(`${API_BASE}/dados?empresa=${encodeURIComponent(emp)}&dias=${dias}`);
        const data = await res.json();

        document.getElementById("saldo").innerText = "R$ " + data.saldo.toLocaleString('pt-BR');
        
        const corpo = document.getElementById("corpo");
        corpo.innerHTML = data.datas.map((d, i) => `
            <tr>
                <td>${d.split('-').reverse().join('/')}</td>
                <td class="pos">R$ ${data.receber[i].toLocaleString('pt-BR')}</td>
                <td class="neg">R$ ${data.pagar[i].toLocaleString('pt-BR')}</td>
                <td style="font-weight:bold">R$ ${data.acumulado[i].toLocaleString('pt-BR')}</td>
            </tr>
        `).join('');
    }
    init();
</script>
</body>
</html>
