<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fluxo de Caixa</title>
    <style>
    :root {
        --primary: #FF4B4B; /* Vermelho Streamlit */
        --bg: #f0f2f6;
        --sidebar: #f8f9fb;
    }
    body { font-family: 'Source Sans Pro', sans-serif; background: var(--bg); margin: 0; display: flex; }
    
    /* Barra Lateral */
    .sidebar { width: 300px; background: var(--sidebar); height: 100vh; padding: 20px; border-right: 1px solid #ddd; }
    
    /* Área Principal */
    .main-content { flex: 1; padding: 40px; }
    
    /* Cards de Saldo */
    .metric-card {
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        border-left: 5px solid var(--primary);
    }
    .metric-value { font-size: 2rem; font-weight: bold; color: #31333F; }
    
    /* Tabela */
    table { width: 100%; background: white; border-collapse: collapse; margin-top: 20px; border-radius: 8px; overflow: hidden; }
    th { background: #f0f2f6; text-align: left; padding: 12px; color: #555; }
    td { padding: 12px; border-bottom: 1px solid #eee; }
    .pos { color: #09ab3b; } /* Verde para Receber */
    .neg { color: #ff4b4b; } /* Vermelho para Pagar */
</style>
</head>
<body>

<div class="sidebar">
    <h2>Configurações</h2>
    <label>Selecione a Empresa</label>
    <select id="empresa"><option>Carregando...</option></select>
    
    <label>Período (Dias)</label>
    <input type="number" id="dias" value="7">
    
    <button onclick="carregar()">Rodar Dashboard</button>
</div>

<div class="main">
    <h1>Fluxo de Caixa Operacional</h1>
    
    <div class="st-card">
        <div class="st-metric-label">Saldo Atual Consolidado</div>
        <div class="st-metric-value" id="saldo">R$ 0,00</div>
    </div>

    <div class="st-card">
        <h3>Detalhamento Diário</h3>
        <table id="tabela">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Receber</th>
                    <th>Pagar</th>
                    <th>Saldo Previsto</th>
                </tr>
            </thead>
            <tbody id="corpo"></tbody>
        </table>
    </div>
</div>

<script>
    // Se o seu site é https://jrm-dashboard.vercel.app, a API está em /api
    const API_BASE = window.location.origin + "/api";

    async function init() {
        try {
            const res = await fetch(`${API_BASE}/clientes`);
            const empresas = await res.json();
            const select = document.getElementById("empresa");
            select.innerHTML = empresas.map(e => `<option value="${e}">${e}</option>`).join('');
            if(empresas.length > 0) carregar();
        } catch(e) { console.error("Erro ao carregar empresas", e); }
    }

    async function carregar() {
    const emp = document.getElementById("empresa").value;
    const dias = document.getElementById("dias").value;
    
    try {
        const res = await fetch(`${API_BASE}/dados?empresa=${encodeURIComponent(emp)}&dias=${dias}`);
        const data = await res.json();

        // Se a API retornar erro (Token expirado ou Supabase fora), avise aqui:
        if (data.erro || !data.saldo) {
            alert("Erro da API: " + (data.erro || "Dados não encontrados"));
            return;
        }

        document.getElementById("saldo").innerText = "R$ " + data.saldo.toLocaleString('pt-BR');
        
        const corpo = document.getElementById("corpo");
        corpo.innerHTML = data.datas.map((d, i) => `
            <tr>
                <td>${d.split('-').reverse().join('/')}</td>
                <td class="pos">R$ ${data.receber[i].toLocaleString('pt-BR')}</td>
                <td class="neg">R$ ${data.pagar[i].toLocaleString('pt-BR')}</td>
                <td style="font-weight:bold">R$ ${data.acumulado[i].toLocaleString('pt-BR')}</td>
            </tr>
        `).join('');
    } catch (e) {
        console.error("Erro na requisição:", e);
        alert("Falha ao conectar na API. Verifique os logs da Vercel.");
    }
}
    init();
</script>
</body>
</html>
