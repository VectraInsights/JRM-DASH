<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa Profissional | JRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #f4f7f9;
            --bg-side: #ffffff;
            --bg-card: #ffffff;
            --text-main: #1a1c21;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --accent: #FF4B4B;
            --success: #10b981;
            --danger: #ef4444;
            --info: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .dark-theme {
            --bg-body: #0f172a;
            --bg-side: #1e293b;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-sub: #94a3b8;
            --border: #334155;
            --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 340px;
            background-color: var(--bg-side);
            padding: 2.5rem 1.5rem;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 2rem;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .logo-area {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 1rem;
        }

        .form-group { display: flex; flex-direction: column; gap: 0.6rem; }
        label { font-size: 0.75rem; font-weight: 600; text-transform: uppercase; color: var(--text-sub); letter-spacing: 0.05em; }
        
        select, input {
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg-body);
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
            transition: border 0.2s;
        }
        select:focus, input:focus { border-color: var(--accent); }

        .btn-update {
            background: var(--accent);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(255, 75, 75, 0.3);
            transition: transform 0.2s, filter 0.2s;
        }
        .btn-update:hover { transform: translateY(-2px); filter: brightness(1.1); }
        .btn-update:active { transform: translateY(0); }

        /* --- MAIN --- */
        .main {
            flex: 1;
            padding: 2.5rem 4rem;
            overflow-y: auto;
            position: relative;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            margin: 0;
            font-size: 2.4rem;
            font-weight: 800;
            position: relative;
        }
        h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 0;
            width: 60px;
            height: 5px;
            background: var(--accent);
            border-radius: 10px;
        }

        .theme-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            width: 48px;
            height: 48px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: var(--shadow);
            transition: 0.2s;
        }

        /* --- CARDS --- */
        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--bg-card);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 6px;
            background: var(--border);
        }

        .card.purple::before { background: #8b5cf6; }
        .card.green::before { background: var(--success); }
        .card.red::before { background: var(--danger); }
        .card.blue::before { background: var(--info); }

        .card-label { font-size: 0.8rem; font-weight: 600; color: var(--text-sub); }
        .card-val { font-size: 1.6rem; font-weight: 700; margin-top: 12px; }

        /* --- CHART --- */
        .canvas-container {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            height: 500px;
        }

        #custom-fields { display: none; margin-top: 1rem; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo-area">📊 BPO Financeiro</div>
    
    <div class="form-group">
        <label>Unidade de Negócio</label>
        <select id="selEmpresa">
            <option value="Juvenal Transportes">Juvenal Transportes</option>
            <option value="JRM Transportes">JRM Transportes</option>
            <option value="LGP">LGP</option>
            <option value="ROSE">Rosângela Transportes</option>
        </select>
    </div>

    <div class="form-group">
        <label>Horizonte Temporal</label>
        <select id="selPeriodo" onchange="checkCustom(this.value)">
            <option value="7">Próximos 7 dias</option>
            <option value="15">Próximos 15 dias</option>
            <option value="30">Próximos 30 dias</option>
            <option value="custom">Período Customizado</option>
        </select>
        
        <div id="custom-fields">
            <input type="date" id="dateIni" style="margin-bottom:8px">
            <input type="date" id="dateFim">
        </div>
    </div>

    <button class="btn-update" onclick="sincronizar()" id="btnSync">Sincronizar Agora</button>
</aside>

<main class="main">
    <header class="top-bar">
        <h1>Fluxo de Caixa</h1>
        <button class="theme-btn" onclick="toggleTheme()" id="themeIcon">🌙</button>
    </header>

    <section class="stats">
        <div class="card purple">
            <div class="card-label">Disponibilidade Imediata</div>
            <div id="m1" class="card-val" style="color:#8b5cf6">R$ 0,00</div>
        </div>
        <div class="card green">
            <div class="card-label">Entradas Previstas</div>
            <div id="m2" class="card-val" style="color:var(--success)">R$ 0,00</div>
        </div>
        <div class="card red">
            <div class="card-label">Saídas Previstas</div>
            <div id="m3" class="card-val" style="color:var(--danger)">R$ 0,00</div>
        </div>
        <div class="card blue" id="cardProj">
            <div class="card-label">Saldo Projetado</div>
            <div id="m4" class="card-val">R$ 0,00</div>
        </div>
    </section>

    <section class="canvas-container">
        <canvas id="chartMain"></canvas>
    </section>
</main>

<script>
    let myChart = null;

    function toggleTheme() {
        document.body.classList.toggle('dark-theme');
        const isDark = document.body.classList.contains('dark-theme');
        document.getElementById('themeIcon').innerText = isDark ? "☀️" : "🌙";
        if(myChart) sincronizar(); // Recarrega o gráfico para ajustar cores das fontes
    }

    function checkCustom(val) {
        document.getElementById('custom-fields').style.display = val === 'custom' ? 'block' : 'none';
    }

    async function sincronizar() {
        const btn = document.getElementById('btnSync');
        btn.innerText = "Processando...";
        btn.disabled = true;

        const per = document.getElementById('selPeriodo').value;
        let d1, d2;

        if(per === 'custom') {
            d1 = document.getElementById('dateIni').value;
            d2 = document.getElementById('dateFim').value;
        } else {
            const start = new Date();
            d1 = start.toISOString().split('T')[0];
            start.setDate(start.getDate() + parseInt(per));
            d2 = start.toISOString().split('T')[0];
        }

        if(!d1 || !d2) {
            btn.innerText = "Sincronizar Agora";
            btn.disabled = false;
            return alert("Por favor, selecione o intervalo de datas.");
        }

        try {
            const empresa = encodeURIComponent(document.getElementById('selEmpresa').value);
            const response = await fetch(`/api/dados?empresa=${empresa}&data_inicio=${d1}&data_fim=${d2}`);
            const res = await response.json();

            if(res.erro) throw new Error(res.erro);

            // Atualização Numérica
            const brl = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            document.getElementById('m1').innerText = brl(res.saldo_bancos);
            document.getElementById('m2').innerText = brl(res.total_receber);
            document.getElementById('m3').innerText = brl(res.total_pagar);
            
            const projeção = res.saldo_bancos + res.total_receber - res.total_pagar;
            const m4 = document.getElementById('m4');
            m4.innerText = brl(projeção);
            m4.style.color = projeção >= 0 ? "var(--success)" : "var(--danger)";
            document.getElementById('cardProj').style.borderColor = projeção >= 0 ? "var(--success)" : "var(--danger)";

            render(res);
        } catch (err) {
            alert("Erro na Sincronização: " + err.message);
        } finally {
            btn.innerText = "Sincronizar Agora";
            btn.disabled = false;
        }
    }

    function render(data) {
        const ctx = document.getElementById('chartMain').getContext('2d');
        if(myChart) myChart.destroy();

        const isDark = document.body.classList.contains('dark-theme');
        const colorTxt = isDark ? '#94a3b8' : '#64748b';
        const colorGrid = isDark ? '#334155' : '#f1f5f9';

        myChart = new Chart(ctx, {
            data: {
                labels: data.datas.map(d => d.split('-').reverse().slice(0,2).join('/')),
                datasets: [
                    { type: 'bar', label: 'Entradas', data: data.receber, backgroundColor: '#10b981', borderRadius: 6, barThickness: 20 },
                    { type: 'bar', label: 'Saídas', data: data.pagar, backgroundColor: '#ef4444', borderRadius: 6, barThickness: 20 },
                    { type: 'line', label: 'Saldo Projetado', data: data.acumulado, borderColor: '#3b82f6', borderWidth: 4, tension: 0.4, fill: false, pointRadius: 0 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top', labels: { color: colorTxt, font: { weight: '600' }, padding: 20 } },
                    tooltip: { backgroundColor: isDark ? '#1e293b' : '#fff', titleColor: isDark ? '#fff' : '#1e293b', bodyColor: isDark ? '#cbd5e1' : '#475569', borderColor: colorGrid, borderWidth: 1, padding: 15 }
                },
                scales: {
                    x: { grid: { display: false }, ticks: { color: colorTxt } },
                    y: { grid: { color: colorGrid }, ticks: { color: colorTxt, callback: (v) => 'R$ ' + v.toLocaleString('pt-BR') } }
                }
            }
        });
    }

    window.onload = sincronizar;
</script>
</body>
</html>
