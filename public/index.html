<script>
const API = "/api";

// ---------------------------
// 🔹 Carregar empresas
// ---------------------------
async function loadClientes() {
  try {
    const res = await fetch(`${API}/clientes`);

    if (!res.ok) throw new Error("Erro API clientes");

    const data = await res.json();

    console.log("CLIENTES:", data);

    const select = document.getElementById("empresa");
    select.innerHTML = "";

    if (!data || data.length === 0) {
      select.innerHTML = "<option>Nenhuma empresa</option>";
      return;
    }

    data.forEach(emp => {
      const opt = document.createElement("option");
      opt.value = emp;
      opt.innerText = emp;
      select.appendChild(opt);
    });

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar empresas");
  }
}

// ---------------------------
// 🔹 Buscar dados
// ---------------------------
async function carregar() {
  try {
    const empresa = document.getElementById("empresa").value;
    const dias = document.getElementById("dias").value;

    const res = await fetch(`${API}/dados?empresa=${encodeURIComponent(empresa)}&dias=${dias}`);

    if (!res.ok) throw new Error("Erro API dados");

    const data = await res.json();

    console.log("DADOS:", data);

    if (!data || data.erro) {
      alert("Erro ao buscar dados");
      return;
    }

    document.getElementById("saldo").innerText =
      "R$ " + Number(data.saldo || 0).toLocaleString("pt-BR");

    const trace1 = {
      x: data.datas,
      y: data.receber,
      type: 'bar',
      name: 'Receber'
    };

    const trace2 = {
      x: data.datas,
      y: data.pagar.map(v => -v),
      type: 'bar',
      name: 'Pagar'
    };

    const trace3 = {
      x: data.datas,
      y: data.acumulado,
      type: 'scatter',
      name: 'Saldo'
    };

    Plotly.newPlot('grafico', [trace1, trace2, trace3]);

  } catch (err) {
    console.error(err);
    alert("Erro ao carregar dados");
  }
}

// inicia
loadClientes();
</script>
