<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>BPO Financeiro - Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7fe; --sidebar: #ffffff; --primary: #ff4d4d; --text: #2b3674; --sub: #a3aed0; }
        body.dark { --bg: #0b1437; --sidebar: #111c44; --text: #ffffff; --sub: #8f9bba; }
        
        body { font-family: 'Public Sans', sans-serif; margin: 0; display: flex; background: var(--bg); color: var(--text); height: 100vh; }
        
        .sidebar { width: 290px; background: var(--sidebar); padding: 40px 25px; border-right: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; gap: 25px; }
        .logo { font-weight: 800; font-size: 22px; color: var(--primary); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .main { flex: 1; padding: 30px 40px; overflow-y: auto; }
        
        .label { font-size: 12px; font-weight: 700; color: var(--sub); text-transform: uppercase; margin-bottom: 8px; display: block; }
        select, input { width: 100%; padding: 12px; border-radius: 12px; border: 1px solid #e0e5f2; background: transparent; color: var(--text); font-weight: 600; margin-bottom: 15px; }
        
        .btn-sync { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-sync:hover { opacity: 0.8; transform: translateY(-2px); }

        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        
        .cards-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .card { background: var(--sidebar); padding: 20px; border-radius: 20px; box-shadow: 0px 4px 20px rgba(0, 0, 0, 0.02); border: 1px solid rgba(0,0,0,0.02); }
        .card-val { font-size: 24px; font-weight: 800; margin-top: 5px; }
        
        .chart-container { background: var(--sidebar); padding: 30px; border-radius: 20px; height: 450px; position: relative; }
        
        .theme-toggle { cursor: pointer; font-size: 24px; background: none; border: none; }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="logo">📊 BPO Financeiro</div>
    
    <div>
        <span class="label">Unidade de Negócio</span>
        <select id="empresa">
            <option value="Juvenal Transportes">Juvenal Transportes</option>
            <option value="JRM Transportes">JRM Transportes</option>
            <option value="LGP">LGP</option>
            <option value="ROSE">Rosângela Transportes</option>
        </select>
    </div>

    <div>
        <span class="label">Início do Horizonte</span>
        <input type="date" id="data_ini">
        <span class="label">Fim do Horizonte</span>
        <input type="date" id="data_fim">
    </div>

    <button class="btn-sync" onclick="carregarDados()">Sincronizar Agora</button>
</aside>

<main class="main">
    <div class="header-row">
        <h1 style="font-size: 34px; letter-spacing: -1px;">Fluxo de Caixa</h1>
        <button class="theme-toggle" onclick="document.body.classList.toggle('dark')">🌙</button>
    </div>

    <div class="cards-row">
        <div class="card" style="border-left: 5px solid #8b5cf6;">
            <span class="label" style="color: #8b5cf6;">Disponibilidade Imediata</span>
            <div id="saldo_bancos" class="card-val">R$ 0,00</div>
        </div>
        <div class="card" style="border-left: 5px solid #05cd99;">
            <span class="label" style="color: #05cd99;">Entradas Previstas</span>
            <div id="total_receber" class="card-val">R$ 0,00</div>
        </div>
        <div class="card" style="border-left: 5px solid #ee5d50;">
            <span class="label" style="color: #ee5d50;">Saídas Previstas</span>
            <div id="total_pagar" class="card-val">R$ 0,00</div>
        </div>
        <div class="card" style="border-left: 5px solid #01b574;">
            <span class="label" style="color: #01b574;">Saldo Projetado</span>
            <div id="saldo_final" class="card-val">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="fluxoChart"></canvas>
    </div>
</main>

<script>
    let chartInstance = null;

    // Configura datas iniciais
    const d = new Date();
    document.getElementById('data_ini').value = d.toISOString().split('T')[0];
    d.setDate(d.getDate() + 7);
    document.getElementById('data_fim').value = d.toISOString().split('T')[0];

    async function carregarDados() {
        const emp = encodeURIComponent(document.getElementById('empresa').value);
        const ini = document.getElementById('data_ini').value;
        const fim = document.getElementById('data_fim').value;

        const res = await fetch(`/api/dados?empresa=${emp}&data_inicio=${ini}&data_fim=${fim}`);
        const data = await res.json();

        const brl = (v) => v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        document.getElementById('saldo_bancos').innerText = brl(data.saldo_bancos);
        document.getElementById('total_receber').innerText = brl(data.total_receber);
        document.getElementById('total_pagar').innerText = brl(data.total_pagar);
        document.getElementById('saldo_final').innerText = brl(data.saldo_bancos + data.total_receber - data.total_pagar);

        const ctx = document.getElementById('fluxoChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();

        chartInstance = new Chart(ctx, {
            data: {
                labels: data.datas.map(d => d.split('-').reverse().slice(0,2).join('/')),
                datasets: [
                    { type: 'bar', label: 'Entradas', data: data.receber, backgroundColor: '#05cd99', borderRadius: 5 },
                    { type: 'bar', label: 'Saídas', data: data.pagar, backgroundColor: '#ee5d50', borderRadius: 5 },
                    { type: 'line', label: 'Saldo Projetado', data: data.acumulado, borderColor: '#4318ff', borderWidth: 4, tension: 0.4, fill: false }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'top', align: 'end' } },
                scales: { 
                    y: { grid: { drawBorder: false, color: 'rgba(0,0,0,0.05)' } },
                    x: { grid: { display: false } }
                }
            }
        });
    }

    window.onload = carregarDados;
</script>
</body>
</html>
