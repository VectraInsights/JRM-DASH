<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxo de Caixa JRM</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-sidebar: #f0f2f6;
            --bg-card: #ffffff;
            --text-main: #31333F;
            --primary-red: #FF4B4B;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            margin: 0;
            display: flex;
            background-color: #ffffff;
            color: var(--text-main);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 300px;
            background-color: var(--bg-sidebar);
            height: 100vh;
            position: fixed;
            padding: 2rem 1.5rem;
            border-right: 1px solid #e6e9ef;
            box-sizing: border-box;
        }

        .sidebar h1 { font-size: 1.4rem; margin-bottom: 2rem; opacity: 0.8; }
        
        .widget-box { margin-bottom: 1.5rem; }
        label { font-size: 0.85rem; font-weight: 600; display: block; margin-bottom: 0.5rem; }
        
        select, input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #dcdde1;
            background: white;
            font-size: 1rem;
            margin-bottom: 0.5rem;
        }

        .btn-sync {
            background-color: white;
            color: var(--primary-red);
            border: 1px solid var(--primary-red);
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-sync:hover { background-color: var(--primary-red); color: white; }

        /* --- CONTEÚDO PRINCIPAL --- */
        .main-content {
            margin-left: 300px;
            padding: 3rem;
            flex: 1;
            max-width: 1200px;
        }

        .main-content h1 { font-size: 2.5rem; margin-bottom: 2rem; font-weight: 700; }

        /* --- CARDS (ESTILO STREAMLIT) --- */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem;
            margin-bottom: 2.5rem;
        }

        .card-container {
            background-color: #f8f9fb;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #34495e;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.05);
        }

        .card-title { font-size: 13px; opacity: 0.7; font-weight: 600; text-transform: uppercase; }
        .card-value { font-size: 24px; font-weight: 700; margin-top: 8px; }

        /* Cores de borda do seu código original */
        .border-banco { border-left-color: #9b59b6 !important; }
        .border-receber { border-left-color: #2ecc71 !important; }
        .border-pagar { border-left-color: #e74c3c !important; }
        .border-saldo { border-left-color: #3498db !important; }

        /* --- ÁREA DO GRÁFICO --- */
        .chart-section {
            background: white;
            padding: 10px;
            border-radius: 12px;
            height: 450px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h1>Fluxo de Caixa JRM</h1>
        
        <div class="widget-box">
            <label>Selecione a Empresa</label>
            <select id="empresa">
                <option value="Juvenal Transportes">Juvenal Transportes</option>
                <option value="JRM Transportes">JRM Transportes</option>
                <option value="LGP">LGP</option>
                <option value="ROSE">Rosângela Transportes</option>
            </select>
        </div>

        <div class="widget-box">
            <label>Próximos Dias</label>
            <input type="number" id="dias" value="7" min="1" max="30">
        </div>

        <button class="btn-sync" onclick="atualizarDashboard()">Sincronizar Dados</button>
    </div>

    <div class="main-content">
        <h1>Fluxo de Caixa</h1>

        <div class="metrics-grid">
            <div class="card-container border-banco">
                <div class="card-title">SALDO EM BANCO</div>
                <div class="card-value" id="val-banco" style="color: #9b59b6;">R$ 0,00</div>
            </div>
            <div class="card-container border-receber">
                <div class="card-title">RECEITAS</div>
                <div class="card-value" id="val-receitas" style="color: #2ecc71;">R$ 0,00</div>
            </div>
            <div class="card-container border-pagar">
                <div class="card-title">DESPESAS</div>
                <div class="card-value" id="val-despesas" style="color: #e74c3c;">R$ 0,00</div>
            </div>
            <div class="card-container border-saldo">
                <div class="card-title">RESULTADO</div>
                <div class="card-value" id="val-resultado">R$ 0,00</div>
            </div>
        </div>

        <div class="chart-section">
            <canvas id="financeChart"></canvas>
        </div>
    </div>

    <script>
        let myChart = null;

        async function atualizarDashboard() {
            const empresa = document.getElementById('empresa').value;
            const dias = document.getElementById('dias').value;
            const btn = document.querySelector('.btn-sync');
            
            btn.innerText = "Sincronizando...";
            
            try {
                // Rota da sua API na Vercel
                const response = await fetch(`/api/dados?empresa=${encodeURIComponent(empresa)}&dias=${dias}`);
                const data = await response.json();

                // 1. Atualizar Cards
                document.getElementById('val-banco').innerText = formatCurrency(data.saldo_bancos);
                document.getElementById('val-receitas').innerText = formatCurrency(data.total_receber);
                document.getElementById('val-despesas').innerText = formatCurrency(-data.total_pagar);
                
                const resultado = data.saldo_bancos + data.total_receber - data.total_pagar;
                const resField = document.getElementById('val-resultado');
                resField.innerText = formatCurrency(resultado);
                resField.style.color = resultado >= 0 ? "#2ecc71" : "#e74c3c";

                // 2. Atualizar Gráfico
                renderChart(data);

            } catch (error) {
                console.error("Erro:", error);
                alert("Erro ao carregar dados. Verifique o console.");
            } finally {
                btn.innerText = "Sincronizar Dados";
            }
        }

        function formatCurrency(valor) {
            return "R$ " + (valor || 0).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function renderChart(data) {
            const ctx = document.getElementById('financeChart').getContext('2d');
            
            if (myChart) myChart.destroy();

            myChart = new Chart(ctx, {
                data: {
                    labels: data.datas.map(d => d.split('-').reverse().join('/')),
                    datasets: [
                        {
                            type: 'bar',
                            label: 'Receitas',
                            data: data.receber,
                            backgroundColor: '#2ecc71',
                            borderRadius: 4
                        },
                        {
                            type: 'bar',
                            label: 'Despesas',
                            data: data.pagar,
                            backgroundColor: '#e74c3c',
                            borderRadius: 4
                        },
                        {
                            type: 'line',
                            label: 'Saldo Acumulado',
                            data: data.acumulado,
                            borderColor: '#3498db',
                            borderWidth: 3,
                            fill: false,
                            tension: 0.2,
                            pointRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom' }
                    },
                    scales: {
                        x: { grid: { display: false } },
                        y: { grid: { color: '#f0f0f0' }, border: { display: false } }
                    }
                }
            });
        }

        // Iniciar ao carregar
        window.onload = atualizarDashboard;
    </script>
</body>
</html>
