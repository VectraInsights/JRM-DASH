<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fluxo de Caixa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0e1117; --card: #262730; --text: #ffffff;
            --green: #2ecc71; --red: #e74c3c; --blue: #3498db;
        }
        [data-theme="light"] {
            --bg: #f0f2f6; --card: #ffffff; --text: #31333f;
        }
        body { 
            background-color: var(--bg); color: var(--text); 
            font-family: sans-serif; margin: 0; display: flex; 
        }
        .sidebar { width: 260px; padding: 20px; background: var(--card); height: 100vh; }
        .main { flex: 1; padding: 30px; }
        
        /* Cabeçalho */
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        h1 { margin: 0; font-size: 2rem; border-bottom: 3px solid var(--red); padding-bottom: 5px; }
        
        .theme-toggle { 
            cursor: pointer; font-size: 1.5rem; background: none; border: none; 
            padding: 10px; border-radius: 50%; transition: 0.3s;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.1); }

        /* Cards */
        .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { 
            background: var(--card); padding: 20px; border-radius: 10px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-left: 5px solid #ccc;
        }
        .card-label { font-size: 0.75rem; text-transform: uppercase; opacity: 0.8; margin-bottom: 8px; }
        .card-val { font-size: 1.25rem; font-weight: bold; }

        .btn-sync { 
            width: 100%; padding: 12px; background: var(--red); color: white; 
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer; 
        }
        .chart-container { background: var(--card); padding: 20px; border-radius: 10px; height: 450px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3 style="color: var(--red)">Filtros</h3>
    <label>Empresa</label>
    <select id="empresa" style="width:100%; margin: 10px 0 20px;">
        <option value="Juvenal Transportes">Juvenal Transportes</option>
        <option value="JRM Transportes">JRM Transportes</option>
    </select>
    <button class="btn-sync" onclick="sincronizar()">Sincronizar Dados</button>
</aside>

<main class="main">
    <div class="header-row">
        <h1>Fluxo de Caixa</h1>
        <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
    </div>

    <div class="cards">
        <div class="card" style="border-color: #9b59b6">
            <div class="card-label">Saldo em Bancos</div>
            <div id="v-banco" class="card-val">R$ 0,00</div>
        </div>
        <div class="card" style="border-color: var(--green)">
            <div class="card-label">Receitas</div>
            <div id="v-rec" class="card-val" style="color:var(--green)">R$ 0,00</div>
        </div>
        <div class="card" style="border-color: var(--red)">
            <div class="card-label">Despesas</div>
            <div id="v-desp" class="card-val" style="color:var(--red)">R$ 0,00</div>
        </div>
        <div class="card" style="border-color: var(--blue)">
            <div class="card-label">Saldo Projetado</div>
            <div id="v-proj" class="card-val">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</main>

<script>
    // Variável global para o gráfico
    let chart;

    async function sincronizar() {
        console.log("Iniciando sincronização...");
        try {
            // Captura os elementos de forma segura
            const elEmpresa = document.getElementById('empresa');
            const elInicio = document.getElementById('data_inicio');
            const elFim = document.getElementById('data_fim');
            const elIntervalo = document.getElementById('intervalo'); // Para o select de 7/15/30 dias

            // Define valores padrão caso os campos não existam na tela atual
            const empresa = elEmpresa ? elEmpresa.value : 'Juvenal Transportes';
            let data_inicio = elInicio ? elInicio.value : '2026-04-27';
            let data_fim = elFim ? elFim.value : '2026-05-12';
            
            // Se houver um seletor de intervalo (Ex: Próximos 7 dias), você pode usar essa lógica no futuro
            const queryParams = new URLSearchParams({
                empresa: empresa,
                data_inicio: data_inicio,
                data_fim: data_fim
            });

            console.log("Chamando API com:", queryParams.toString());

            const res = await fetch(`/api/dados?${queryParams.toString()}`);
            
            if (!res.ok) {
                const textoErro = await res.text();
                throw new Error(`Erro na API (${res.status}): ${textoErro.substring(0, 100)}`);
            }

            const data = await res.json();
            console.log("Dados recebidos com sucesso:", data);

            // Formatador de moeda (BRL)
            const fmt = v => (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            // Atualiza os Cards (com verificação de existência do ID)
            if(document.getElementById('v-banco')) document.getElementById('v-banco').innerText = fmt(data.resumo?.banco);
            if(document.getElementById('v-rec')) document.getElementById('v-rec').innerText = fmt(data.resumo?.total_rec);
            if(document.getElementById('v-desp')) document.getElementById('v-desp').innerText = fmt(data.resumo?.total_desp);
            
            if(document.getElementById('v-proj')) {
                const saldoFinal = data.saldo && data.saldo.length > 0 ? data.saldo[data.saldo.length - 1] : 0;
                document.getElementById('v-proj').innerText = fmt(saldoFinal);
            }

            // Atualiza o Gráfico
            const chartEl = document.getElementById('mainChart');
            if (chartEl && data.labels) {
                if(chart) chart.destroy();
                const ctx = chartEl.getContext('2d');
                
                chart = new Chart(ctx, {
                    data: {
                        labels: data.labels,
                        datasets: [
                            { type: 'bar', label: 'Receitas', data: data.receitas, backgroundColor: '#2ecc71', stack: 'stack1' },
                            { type: 'bar', label: 'Despesas', data: data.despesas, backgroundColor: '#e74c3c', stack: 'stack1' },
                            { 
                                type: 'line', 
                                label: 'Saldo Projetado', 
                                data: data.saldo, 
                                borderColor: '#3498db', 
                                borderWidth: 3, 
                                pointRadius: 4, 
                                tension: 0.1,
                                fill: false 
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { position: 'bottom', labels: { color: '#a3aed0' } } },
                        scales: {
                            x: { stacked: true, grid: { display: false }, ticks: { color: '#a3aed0' } },
                            y: { stacked: false, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#a3aed0' } }
                        }
                    }
                });
            }

        } catch (err) {
            console.error("Falha crítica no script:", err);
            // Se der erro, não deixa os campos vazios, mostra o erro no console
        }
    }

    // Executa ao carregar para não iniciar zerado
    document.addEventListener('DOMContentLoaded', sincronizar);
</script>
