<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Fluxo de Caixa - Gestão Financeira</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #0e1117; 
            --sidebar: #262730; 
            --text: #ffffff;
            --green: #2ecc71; 
            --red: #ff4b4b; 
            --blue: #3498db;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: "Source Sans Pro", sans-serif; 
            margin: 0; 
            display: flex; 
        }

        /* Barra Lateral Estilo Streamlit */
        .sidebar { 
            width: 280px; 
            padding: 40px 20px; 
            background: var(--sidebar); 
            height: 100vh; 
            position: fixed;
            box-sizing: border-box;
            border-right: 1px solid var(--border);
        }

        .sidebar h3 { font-size: 1.2rem; margin-bottom: 20px; color: var(--text); }

        .sidebar label { font-size: 0.85rem; opacity: 0.8; display: block; margin-bottom: 5px; }

        .sidebar select, .sidebar input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: white;
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }

        /* Área Principal */
        .main { 
            flex: 1; 
            margin-left: 280px; 
            padding: 40px; 
            min-height: 100vh;
        }

        h1 { margin-top: 0; font-size: 2.2rem; margin-bottom: 30px; }

        /* Grid de Cards */
        .cards { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }

        .card { 
            background: var(--sidebar); 
            padding: 20px; 
            border-radius: 8px; 
            border: 1px solid var(--border);
            transition: transform 0.2s;
        }

        .card-label { font-size: 0.8rem; text-transform: uppercase; opacity: 0.7; margin-bottom: 10px; }
        .card-val { font-size: 1.4rem; font-weight: 600; }

        /* Botão */
        .btn-sync { 
            width: 100%; 
            padding: 10px; 
            background: transparent; 
            color: var(--red); 
            border: 1px solid var(--red);
            border-radius: 4px; 
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s;
        }

        .btn-sync:hover { background: var(--red); color: white; }

        .chart-container { 
            background: var(--sidebar); 
            padding: 25px; 
            border-radius: 12px; 
            height: 400px; 
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<aside class="sidebar">
    <h3>Filtros</h3>
    
    <label>Empresa</label>
    <select id="empresa">
        <option value="Juvenal Transportes">Juvenal Transportes</option>
        </select>

    <label>Intervalo de Projeção</label>
    <select id="intervalo" onchange="ajustarDatas()">
        <option value="7">Próximos 7 dias</option>
        <option value="15" selected>Próximos 15 dias</option>
        <option value="30">Próximos 30 dias</option>
    </select>

    <label>Data Início</label>
    <input type="date" id="data_inicio">

    <label>Data Fim</label>
    <input type="date" id="data_fim">

    <button class="btn-sync" onclick="sincronizar()">Sincronizar Agora</button>
</aside>

<main class="main">
    <h1>Fluxo de Caixa Projetado</h1>

    <div class="cards">
        <div class="card">
            <div class="card-label">Saldo Atual (Bancos)</div>
            <div id="v-banco" class="card-val">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-label">Receitas no Período</div>
            <div id="v-rec" class="card-val" style="color:var(--green)">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-label">Despesas no Período</div>
            <div id="v-desp" class="card-val" style="color:var(--red)">R$ 0,00</div>
        </div>
        <div class="card">
            <div class="card-label">Saldo Projetado Final</div>
            <div id="v-proj" class="card-val" style="color:var(--blue)">R$ 0,00</div>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="mainChart"></canvas>
    </div>
</main>

<script>
    let chart;

    // Função para calcular datas automaticamente como no Streamlit
    function ajustarDatas() {
        const dias = parseInt(document.getElementById('intervalo').value);
        const hoje = new Date();
        const futuro = new Date();
        futuro.setDate(hoje.getDate() + dias);

        document.getElementById('data_inicio').value = hoje.toISOString().split('T')[0];
        document.getElementById('data_fim').value = futuro.toISOString().split('T')[0];
    }

    async function sincronizar() {
        try {
            const empresa = document.getElementById('empresa').value;
            const data_inicio = document.getElementById('data_inicio').value;
            const data_fim = document.getElementById('data_fim').value;

            const query = new URLSearchParams({ empresa, data_inicio, data_fim });
            const res = await fetch(`/api/dados?${query.toString()}`);
            
            if (!res.ok) throw new Error("Erro ao buscar dados do servidor");
            
            const data = await res.json();
            const fmt = v => (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });

            // Atualiza Interface
            document.getElementById('v-banco').innerText = fmt(data.resumo?.banco);
            document.getElementById('v-rec').innerText = fmt(data.resumo?.total_rec);
            document.getElementById('v-desp').innerText = fmt(data.resumo?.total_desp);
            
            const saldoFinal = data.saldo?.length > 0 ? data.saldo[data.saldo.length - 1] : 0;
            document.getElementById('v-proj').innerText = fmt(saldoFinal);

            // Gráfico
            if(chart) chart.destroy();
            const ctx = document.getElementById('mainChart').getContext('2d');
            chart = new Chart(ctx, {
                data: {
                    labels: data.labels,
                    datasets: [
                        { type: 'bar', label: 'Receitas', data: data.receitas, backgroundColor: '#2ecc71', stack: 's1' },
                        { type: 'bar', label: 'Despesas', data: data.despesas, backgroundColor: '#ff4b4b', stack: 's1' },
                        { 
                            type: 'line', 
                            label: 'Saldo Acumulado', 
                            data: data.saldo, 
                            borderColor: '#3498db', 
                            borderWidth: 3, 
                            pointRadius: 4, 
                            tension: 0.1, 
                            fill: false 
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#ffffff' }, position: 'bottom' } },
                    scales: {
                        x: { stacked: true, ticks: { color: '#ffffff' }, grid: { display: false } },
                        y: { ticks: { color: '#ffffff' }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
        } catch (err) {
            console.error(err);
        }
    }

    // Inicialização
    document.addEventListener('DOMContentLoaded', () => {
        ajustarDatas();
        sincronizar();
    });
</script>
</body>
</html>
